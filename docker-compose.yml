# MIGANCORE Docker Compose Stack
# Note: 'version' attribute removed (obsolete in Docker Compose v2+)

services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ./data/ollama:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL: "2"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_KEEP_ALIVE: "24h"
    deploy:
      resources:
        limits: { memory: 12G }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ado
      POSTGRES_USER: ado
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    deploy:
      resources:
        limits: { memory: 4G }
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "ado"]

  qdrant:
    image: qdrant/qdrant:v1.9.0
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    deploy:
      resources:
        limits: { memory: 4G }

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "1500mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - ./data/redis:/data
    deploy:
      resources:
        limits: { memory: 2G }

  letta:
    image: letta/letta:0.6.0
    restart: unless-stopped
    environment:
      LETTA_PG_URI: postgresql://ado:${PG_PASSWORD}@postgres:5432/ado
      LETTA_OLLAMA_BASE_URL: http://ollama:11434
      LETTA_SERVER_PASSWORD: ${LETTA_PASSWORD}
      SECURE: "true"
    depends_on:
      postgres: { condition: service_healthy }
      ollama: { condition: service_healthy }
    deploy:
      resources:
        limits: { memory: 3G }

  api:
    build: { context: ./api, dockerfile: Dockerfile }
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ado:${PG_PASSWORD}@postgres:5432/ado
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      OLLAMA_URL: http://ollama:11434
      LETTA_URL: http://letta:8283
      LETTA_PASSWORD: ${LETTA_PASSWORD}
      JWT_PRIVATE_KEY_PATH: /etc/ado/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /etc/ado/keys/public.pem
    volumes:
      - /etc/ado/keys:/etc/ado/keys:ro
    depends_on: [postgres, qdrant, redis, letta, ollama]
    deploy:
      resources:
        limits: { memory: 2G }

  worker_code:
    build: { context: ./api, dockerfile: Dockerfile }
    command: celery -A app.celery worker -Q code -c 2 -l info
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ado:${PG_PASSWORD}@postgres:5432/ado
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      OLLAMA_URL: http://ollama:11434
      LETTA_URL: http://letta:8283
      LETTA_PASSWORD: ${LETTA_PASSWORD}
    deploy:
      resources:
        limits: { memory: 1G }

  worker_web:
    build: { context: ./api, dockerfile: Dockerfile }
    command: celery -A app.celery worker -Q web -c 2 -l info
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ado:${PG_PASSWORD}@postgres:5432/ado
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      OLLAMA_URL: http://ollama:11434
      LETTA_URL: http://letta:8283
      LETTA_PASSWORD: ${LETTA_PASSWORD}
    deploy:
      resources:
        limits: { memory: 1G }

  worker_research:
    build: { context: ./api, dockerfile: Dockerfile }
    command: celery -A app.celery worker -Q research,kb,training -c 1 -l info
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ado:${PG_PASSWORD}@postgres:5432/ado
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      OLLAMA_URL: http://ollama:11434
      LETTA_URL: http://letta:8283
      LETTA_PASSWORD: ${LETTA_PASSWORD}
    deploy:
      resources:
        limits: { memory: 1G }

  langfuse:
    image: langfuse/langfuse:2
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ado:${PG_PASSWORD}@postgres:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET}
      NEXTAUTH_URL: https://lab.migancore.com
      SALT: ${LANGFUSE_SALT}
    depends_on: [postgres]
    deploy:
      resources:
        limits: { memory: 1G }

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data/caddy:/data
      - ./config/caddy:/config

networks:
  default:
    name: ado_network
