# MIGANCORE Docker Compose Stack
# Note: 'version' attribute removed (obsolete in Docker Compose v2+)
#
# Architecture: Nginx aaPanel = edge reverse proxy (ports 80/443)
# MiganCore services bind to 127.0.0.1 only — never exposed to internet directly.
# Caddy disabled on this VPS (profile: ingress) — nginx handles SSL.
#
# Profiles:
#   default:    postgres, redis, qdrant, ollama, api (always on)
#   memory:     letta
#   workers:    celery workers
#   observability: langfuse
#   training:   mlflow/studio (future)
#   ingress:    caddy (DISABLED — nginx aaPanel owns 80/443)

services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ./data/ollama:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_KEEP_ALIVE: "24h"
      OLLAMA_MAX_QUEUE: "32"
      OLLAMA_NUM_THREAD: "6"  # Day 67: 4→6 (llamaserver stopped, steal ~0%, SIDIX migrated)
    deploy:
      resources:
        limits: { memory: 12G, cpus: "6.0" }  # Day 67: 4→6 cores (freed by llamaserver stop)
    # Note: No healthcheck — ollama image lacks curl/wget.
    # Health verified externally via `docker compose exec ollama ollama list`.

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ado
      POSTGRES_USER: ado
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    deploy:
      resources:
        limits: { memory: 4G }
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "ado"]

  qdrant:
    image: qdrant/qdrant:v1.12.0
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits: { memory: 4G }

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "1500mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - ./data/redis:/data
    deploy:
      resources:
        limits: { memory: 2G }

  letta:
    image: letta/letta:0.6.0
    restart: unless-stopped
    profiles: ["memory"]
    environment:
      LETTA_PG_URI: postgresql://ado_app:${PG_PASSWORD}@postgres:5432/letta_db
      LETTA_OLLAMA_BASE_URL: http://ollama:11434
      LETTA_SERVER_PASSWORD: ${LETTA_PASSWORD}
      SECURE: "true"
    depends_on:
      - postgres
      - ollama
    deploy:
      resources:
        limits: { memory: 3G }

  api:
    build: { context: ./api, dockerfile: Dockerfile }
    restart: unless-stopped
    ports:
      - "127.0.0.1:18000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ado_app:${PG_PASSWORD}@postgres:5432/ado
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      OLLAMA_URL: http://ollama:11434
      LETTA_URL: http://letta:8283
      LETTA_PASSWORD: ${LETTA_PASSWORD}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY}
      # Day 62: ADO License System
      LICENSE_SECRET_KEY: ${LICENSE_SECRET_KEY}
      LICENSE_DEMO_MODE: ${LICENSE_DEMO_MODE:-true}
      ADO_DISPLAY_NAME: ${ADO_DISPLAY_NAME:-Migan}
      LICENSE_INTERNAL_KEY: ${LICENSE_INTERNAL_KEY}
      # ISSUER MODE (Codex review Day 62): set true ONLY on api.migancore.com parent.
      # Child ADO deployments MUST leave this unset/false → /mint and /batch return 404.
      LICENSE_ISSUER_MODE: ${LICENSE_ISSUER_MODE:-false}
      FAL_KEY: ${FAL_KEY}                         # Day 24: fal.ai image/video generation
      ELEVENLABS_KEY: ${ELEVENLABS_KEY}           # Day 27: ElevenLabs TTS
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID} # Day 28: user's voice library voice
      API_KEY_PEPPER: ${API_KEY_PEPPER}           # Day 27: server-side HMAC pepper for API keys
      # Day 28 — Teacher APIs for distillation pipeline
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      KIMI_API_KEY: ${KIMI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}        # Day 67: Tavily real-time search
      SERPER_API_KEY: ${SERPER_API_KEY}        # Day 67: Serper Google search

      # Day 37 — CAI judge backend selector (ollama|quorum)
      JUDGE_BACKEND: ${JUDGE_BACKEND:-ollama}
      JUDGE_QUORUM_REQUIRE_CONSENSUS: ${JUDGE_QUORUM_REQUIRE_CONSENSUS:-true}
      JWT_PRIVATE_KEY_PATH: /etc/ado/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /etc/ado/keys/public.pem
      # Day 68 (Codex C4): build metadata for /health endpoint
      # Set at deploy time: BUILD_COMMIT_SHA=$(git rev-parse --short HEAD) docker compose up -d api
      BUILD_COMMIT_SHA: ${BUILD_COMMIT_SHA:-unknown}
      BUILD_DAY: ${BUILD_DAY:-Day 70}
    volumes:
      - /etc/ado/keys:/etc/ado/keys:ro
      - ./config:/app/config:ro
      - fastembed_cache:/app/.cache/fastembed   # Persist model downloads across rebuilds
      - ./data/workspace:/app/workspace         # Day 24: sandboxed file system for agents
      - ./eval:/app/eval                       # Day 39: identity eval scripts + persona set
      - /opt/sidix/tools/hyperx-browser:/app/hyperx:rw     # Day 42: HYPERX browser (Node.js MCP, mounted RO from sidix tools)
    depends_on: [postgres, qdrant, redis, ollama]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits: { memory: 4G }

  # Celery workers DISABLED for seed stage — saves 4-6GB RAM.
  # Use asyncio.create_task() for background jobs instead.
  # Re-enable when training pipeline (Week 4+) needs distributed queues.
  #
  # worker_code:
  #   build: { context: ./api, dockerfile: Dockerfile }
  #   command: celery -A app.celery worker -Q code -c 2 -l info
  #   ...
  #
  # worker_web:
  #   build: { context: ./api, dockerfile: Dockerfile }
  #   command: celery -A app.celery worker -Q web -c 2 -l info
  #   ...
  #
  # worker_research:
  #   build: { context: ./api, dockerfile: Dockerfile }
  #   command: celery -A app.celery worker -Q research,kb,training -c 1 -l info
  #   ...

  langfuse:
    image: langfuse/langfuse:2
    restart: unless-stopped
    profiles: ["observability"]
    ports:
      - "127.0.0.1:13001:3000"
    environment:
      DATABASE_URL: postgresql://ado_app:${PG_PASSWORD}@postgres:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET}
      NEXTAUTH_URL: https://lab.migancore.com
      SALT: ${LANGFUSE_SALT}
    depends_on: [postgres]
    deploy:
      resources:
        limits: { memory: 1G }

  # Caddy is DISABLED on this VPS.
  # nginx aaPanel owns ports 80/443. MiganCore services bind to 127.0.0.1 only.
  # To enable Caddy (e.g., on a dedicated VPS), run: docker compose --profile ingress up -d
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["ingress"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data/caddy:/data
      - ./config/caddy:/config

volumes:
  fastembed_cache:   # Persistent fastembed model cache (dense + sparse BM42 models)

networks:
  default:
    name: ado_network
