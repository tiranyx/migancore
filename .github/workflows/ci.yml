name: CI — Test & Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run unit tests
        env:
          ENVIRONMENT: "development"
          DATABASE_URL: "postgresql+asyncpg://ado_app:test@localhost:5432/ado"
          REDIS_URL: "redis://:test@localhost:6379/0"
        run: |
          pytest tests/ -v --ignore=tests/test_rls.py --ignore=tests/integration/ --cov=api --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./api/coverage.xml
          fail_ci_if_error: false

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./api

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ado
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ado_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run integration tests
        env:
          ENVIRONMENT: "development"
          TEST_DATABASE_URL: "postgresql+asyncpg://ado:test@localhost:5432/ado_test"
          DATABASE_URL: "postgresql+asyncpg://ado:test@localhost:5432/ado_test"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          pytest tests/integration/ -v --cov=api --cov-report=xml --cov-report=term
