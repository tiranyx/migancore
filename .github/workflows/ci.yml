name: CI — Test & Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run unit tests
        env:
          ENVIRONMENT: "development"
          DATABASE_URL: "postgresql+asyncpg://ado_app:test@localhost:5432/ado"
          REDIS_URL: "redis://:test@localhost:6379/0"
        run: |
          pytest tests/ -v --ignore=tests/test_rls.py --ignore=tests/integration/ --cov=api --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./api/coverage.xml
          fail_ci_if_error: false

  integration-test:
    name: Integration Tests + Coverage Gate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./api

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ado_app
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ado_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        env:
          REDIS_PASSWORD: test
        options: >-
          --health-cmd "redis-cli -a test ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      qdrant:
        image: qdrant/qdrant:v1.12.0
        ports:
          - 6333:6333

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Generate test RSA keys
        run: |
          mkdir -p /tmp/test_keys
          openssl genrsa -out /tmp/test_keys/private.pem 2048
          openssl rsa -in /tmp/test_keys/private.pem -pubout -out /tmp/test_keys/public.pem

      - name: Run full test suite with coverage gate
        env:
          ENVIRONMENT: "testing"
          DATABASE_URL: "postgresql+asyncpg://ado_app:test@localhost:5432/ado_test"
          REDIS_URL: "redis://:test@localhost:6379/0"
          QDRANT_URL: "http://localhost:6333"
          QDRANT_API_KEY: ""
          OLLAMA_URL: "http://localhost:11434"
          LETTA_URL: "http://localhost:8283"
          ADMIN_SECRET_KEY: "test-admin-key-for-ci-only"
          LICENSE_SECRET_KEY: "test-license-secret-for-ci-only"
          LICENSE_DEMO_MODE: "true"
          ADO_DISPLAY_NAME: "TestMigan"
          JWT_PRIVATE_KEY_PATH: "/tmp/test_keys/private.pem"
          JWT_PUBLIC_KEY_PATH: "/tmp/test_keys/public.pem"
          JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 60
          JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
          # Disable external APIs during tests
          ANTHROPIC_API_KEY: ""
          OPENAI_API_KEY: ""
          KIMI_API_KEY: ""
          GEMINI_API_KEY: ""
          TAVILY_API_KEY: ""
          SERPER_API_KEY: ""
          FAL_KEY: ""
          ELEVENLABS_KEY: ""
        run: |
          pytest tests/ \
            --cov=. \
            --cov-config=.coveragerc.docker \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml \
            --cov-fail-under=40 \
            -v \
            --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./api/coverage.xml
          fail_ci_if_error: false
