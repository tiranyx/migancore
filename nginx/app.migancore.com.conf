server {
    listen 80;
    server_name app.migancore.com;

    location /.well-known/acme-challenge/ {
        root /www/wwwroot/app.migancore.com;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name app.migancore.com;

    ssl_certificate     /etc/letsencrypt/live/app.migancore.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.migancore.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root  /opt/ado/frontend;
    index chat.html;

    # Security headers (Day 71c hardening) — server-level defaults
    # NOTE: nginx add_header is REPLACED (not merged) in nested location blocks.
    # We include this snippet in every location with its own add_header below.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(self), interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Brotli + gzip if available (gzip already on at server level)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/manifest+json image/svg+xml;
    gzip_min_length 256;

    location /.well-known/acme-challenge/ {
        root /www/wwwroot/app.migancore.com;
    }

    # Service Worker — MUST not be long-cached (browsers also enforce max-age=86400)
    # Day 71c: register at root scope so SW can intercept /chat.html
    location = /sw.js {
        # Repeat security headers (nginx add_header doesn't cascade)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(self), interest-cohort=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # SW-specific
        add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        expires 0;
    }

    # PWA manifest — short cache, allows updates
    location = /manifest.json {
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(self), interest-cohort=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        expires 5m;
        types { } default_type "application/manifest+json";
    }

    # Day 71c: HTML uses must-revalidate (browser asks via ETag, gets 304 if unchanged)
    # Replaces previous no-store policy — gives 304 fast-path for unchanged HTML.
    # ETag is automatically set by nginx for static files.
    location ~* \.(html?)$ {
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(self), interest-cohort=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
        expires 0;
    }

    # SPA root → chat.html
    location = / {
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(self), interest-cohort=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
        try_files $uri /chat.html;
    }

    # Static assets — long cache (filenames are versioned via SW cache key when needed)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot)$ {
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(self), interest-cohort=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Cache-Control "public, max-age=604800, immutable" always;
        expires 7d;
        access_log off;
    }

    # SPA fallback — any unmatched path serves chat.html
    location / {
        try_files $uri $uri/ /chat.html;
    }

    access_log /www/wwwlogs/app.migancore.com.log;
    error_log  /www/wwwlogs/app.migancore.com.error.log;
}
