# nginx config untuk app.migancore.com
# Lokasi di VPS: /www/server/panel/vhost/nginx/app.migancore.com.conf
#
# CARA DEPLOY:
# 1. Copy file chat.html ke VPS:
#    scp -i ~/.ssh/sidix_session_key frontend/chat.html root@72.62.125.6:/opt/ado/frontend/
#
# 2. Copy config ini ke VPS:
#    scp -i ~/.ssh/sidix_session_key docs/nginx_app_migancore.conf \
#        root@72.62.125.6:/www/server/panel/vhost/nginx/app.migancore.com.conf
#
# 3. Setup SSL:
#    ssh -i ~/.ssh/sidix_session_key root@72.62.125.6
#    certbot --nginx -d app.migancore.com --email tiranyx.id@gmail.com --agree-tos --non-interactive
#
# 4. Reload nginx:
#    nginx -t && nginx -s reload
#
# 5. Tambah A record DNS:
#    Type: A | Name: app | Value: 72.62.125.6 | TTL: 300

server {
    listen 80;
    server_name app.migancore.com;

    # Redirect HTTP → HTTPS (will be managed by certbot)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.migancore.com;

    # SSL — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/app.migancore.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.migancore.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Root: static HTML
    root  /opt/ado/frontend;
    index chat.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Serve chat.html for all routes (SPA fallback)
    location / {
        try_files $uri $uri/ /chat.html;
    }

    # Caching for static assets (fonts, etc. loaded from CDN — this just covers local files)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Disable access log for health checks
    access_log /www/wwwlogs/app.migancore.com.log;
    error_log  /www/wwwlogs/app.migancore.com.error.log;
}
