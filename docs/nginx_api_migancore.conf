# nginx config untuk api.migancore.com
# Lokasi di VPS: /www/server/panel/vhost/nginx/api.migancore.com.conf
#
# CARA DEPLOY:
# 1. Copy config ini ke VPS:
#    scp -i ~/.ssh/sidix_session_key docs/nginx_api_migancore.conf \
#        root@72.62.125.6:/www/server/panel/vhost/nginx/api.migancore.com.conf
#
# 2. Setup SSL:
#    ssh -i ~/.ssh/sidix_session_key root@72.62.125.6
#    certbot --nginx -d api.migancore.com --email tiranyx.id@gmail.com --agree-tos --non-interactive
#
# 3. Reload nginx:
#    nginx -t && nginx -s reload
#
# 4. Tambah A record DNS:
#    Type: A | Name: api | Value: 72.62.125.6 | TTL: 300

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name api.migancore.com;
    return 301 https://$host$request_uri;
}

# HTTPS API proxy
server {
    listen 443 ssl http2;
    server_name api.migancore.com;

    # SSL — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/api.migancore.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.migancore.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self' https://api.migancore.com wss://api.migancore.com;" always;

    # Client body size — allow large file uploads (datasets, images)
    client_max_body_size 50M;

    # Proxy to API container (binds to 127.0.0.1:18000)
    location / {
        proxy_pass http://127.0.0.1:18000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for future streaming)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts — generous for LLM inference (up to 120s)
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Buffering — disable for SSE streaming
        proxy_buffering off;
    }

    access_log /www/wwwlogs/api.migancore.com.log;
    error_log  /www/wwwlogs/api.migancore.com.error.log;
}
