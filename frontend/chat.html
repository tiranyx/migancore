    );
  }

  // ===========================
  // MESSAGE COMPONENT
  // ===========================
  // Day 40 — single tool execution chip rendered inside assistant bubble.
  // Memoized by tool key (name + index) so the chip doesn't re-render on every
  // streamed text chunk (research pitfall #2: re-rendering chips per SSE token).
  const ToolChip = React.memo(function ToolChip({ tool }) {
    const icon = tool.state === 'running' ? '⏳' : tool.state === 'error' ? '⚠' : '✓';
    const color =
      tool.state === 'running' ? 'var(--orange)' :
      tool.state === 'error'   ? '#ff6b6b' :
                                 'var(--green)';
    const dim =
      tool.state === 'running' ? 'var(--orange-dim)' :
      tool.state === 'error'   ? 'rgba(255, 107, 107, 0.10)' :
                                 'var(--green-dim)';
    const border =
      tool.state === 'running' ? 'var(--orange-border)' :
      tool.state === 'error'   ? 'rgba(255, 107, 107, 0.40)' :
                                 'var(--green-border)';
    const previewable = tool.state !== 'running' && (tool.result !== null || tool.error);
    const label = tool.state === 'running' ? `running ${tool.name}…` : tool.name;
    return (
      <div style={{
        display: 'inline-flex', alignItems: 'center', gap: 6, padding: '4px 9px',
        background: dim, color: color, border: `1px solid ${border}`,
        borderRadius: 6, fontFamily: 'var(--mono)', fontSize: 11, marginRight: 6, marginBottom: 6,
      }}>
        <span>{icon}</span>
        <span>{label}</span>
        {previewable && (
          <details style={{ display: 'inline', marginLeft: 4 }}>
            <summary style={{ cursor: 'pointer', opacity: 0.7, fontSize: 10 }}>result</summary>
            <pre style={{
              maxWidth: 380, maxHeight: 140, overflow: 'auto',
              background: 'var(--bg-0)', color: 'var(--text-dim)',
              padding: 6, marginTop: 4, fontSize: 10, borderRadius: 4,
              whiteSpace: 'pre-wrap', wordBreak: 'break-word',
            }}>
              {tool.error
                ? `Error: ${tool.error}`
                : (typeof tool.result === 'string'
                    ? tool.result.slice(0, 800)
                    : JSON.stringify(tool.result, null, 2).slice(0, 800))}
            </pre>
          </details>
        )}
      </div>
    );
  });

  function Msg({ msg, onRetry }) {
    const { role, content, streaming, toolCount, error, tools, attachments } = msg;
    const label = role === 'user' ? 'YOU' : 'MC';
    const isError = !!error || (content || '').startsWith('⚠');
    const errClass = isError ? ' error-bubble' : '';

    // Day 36: Status hierarchy when streaming with NO content yet
    const isThinking = streaming && !content;

    // Track elapsed seconds while thinking
    const [elapsed, setElapsed] = React.useState(0);
    React.useEffect(() => {
      if (!isThinking) { setElapsed(0); return; }
      const start = Date.now();
      const t = setInterval(() => setElapsed(Math.floor((Date.now() - start) / 1000)), 1000);
      return () => clearInterval(t);
    }, [isThinking]);

    // 3-state status (Day 36): Connecting → Thinking → Generating
    const statusText =
      elapsed < 3  ? 'Menghubungkan...' :
      elapsed < 15 ? 'MiganCore sedang berpikir...' :
                     'Generating response...';

    return (
      <div className={`msg-row ${role}`}>
        <div className="msg-avatar">{label}</div>
        <div>
          {isThinking ? (
            <div className="thinking-indicator">
              <span className="dots"><span></span><span></span><span></span></span>
              <span>{statusText}</span>
              {elapsed > 5 && (
                <span className="thinking-elapsed">· {elapsed}s</span>
              )}
              {elapsed > 30 && (
                <span className="thinking-elapsed" style={{ color: 'var(--orange)' }}>
                  · CPU 7B (lambat normal, jangan refresh)
                </span>
              )}
            </div>
          ) : (
            <div className={`msg-bubble${streaming ? ' streaming' : ''}${errClass}`}>
              {/* Day 40 — tool execution chips inside the assistant bubble, before the streamed text */}
              {role === 'assistant' && Array.isArray(tools) && tools.length > 0 && (
                <div style={{ marginBottom: content ? 8 : 0 }}>
                  {tools.map((t, i) => (
                    <ToolChip key={`${t.name}-${i}`} tool={t} />
                  ))}
                </div>
              )}
              {/* Day 40 — image thumbnails in USER bubble (attachments shown as user-uploaded) */}
              {role === 'user' && Array.isArray(attachments) && attachments.length > 0 && (
                <div style={{
                  display: 'flex', flexWrap: 'wrap', gap: 6,
                  marginBottom: content ? 8 : 0,
                }}>
                  {attachments.map((a, i) => (
                    <a
                      key={a.id || i}
                      href={a.dataUrl}
                      target="_blank"
                      rel="noreferrer"
                      title={a.name || `image ${i+1}`}
                      style={{ display: 'inline-block', lineHeight: 0 }}
                    >
                      <img
                        src={a.dataUrl}
                        alt={a.name || `image ${i+1}`}
                        style={{
                          width: 96, height: 96, objectFit: 'cover',
                          borderRadius: 6, border: '1px solid var(--border)',
                          display: 'block',
                        }}
                      />
                    </a>
                  ))}
                </div>
              )}
              {content}
            </div>
          )}

          {/* Day 36: Retry button on error */}
          {isError && onRetry && msg.lastUserText && (
            <button
              onClick={() => onRetry(msg)}
              style={{
                marginTop: '0.5rem',
                padding: '0.4rem 0.85rem',
                background: 'var(--orange-dim)',
                color: 'var(--orange)',
                border: '1px solid var(--orange-border)',
                borderRadius: '6px',
                fontFamily: 'var(--mono)',
                fontSize: '0.7rem',
                fontWeight: 600,
                letterSpacing: '0.05em',
                cursor: 'pointer',
                transition: 'all 0.15s',
              }}
              onMouseEnter={(e) => { e.currentTarget.style.background = 'var(--orange)'; e.currentTarget.style.color = '#1a0f00'; }}
              onMouseLeave={(e) => { e.currentTarget.style.background = 'var(--orange-dim)'; e.currentTarget.style.color = 'var(--orange)'; }}
            >
              ↻ RETRY
            </button>
          )}

          {/* Day 40: legacy toolCount badge kept as fallback for sync /chat (no SSE tool events) */}
          {!Array.isArray(tools) && toolCount > 0 && (
            <div className="tool-badge">⚙ {toolCount} tool call{toolCount > 1 ? 's' : ''}</div>
          )}
        </div>
      </div>
    );
  }

  // ===========================
  // CHAT SCREEN
  // ===========================
  // Day 51: Research-validated chips (Vercel A/B 2025 — 3 chips beat 6 by 40%)
  // Strategy: showcase 3 unique moats (Wikipedia search + image generation + web read)
  // NOT generic "what can you do" — that triggers empty-state paralysis
  const HINTS = [
    '💭 Cari di Wikipedia tentang Soekarno',
    '🎨 Gambarkan kucing oranye lucu sedang tidur',
    '📄 Baca https://news.ycombinator.com',
  ];

  function ChatScreen({ user, onLogout }) {
    const [msgs, setMsgs]           = useState([]);
    const [input, setInput]         = useState('');
    const [busy, setBusy]           = useState(false);
    const [agentId, setAgentId]     = useState(null);
    const [agentName, setAgentName] = useState('MiganCore');
    const [convId, setConvId]       = useState(null);
    const [convList, setConvList]   = useState([]);
    const [initErr, setInitErr]     = useState('');
    const [initing, setIniting]     = useState(true);
    // Day 29 — agent list + spawn modal
    const [agents, setAgents]       = useState([]);
    const [spawnOpen, setSpawnOpen] = useState(false);
    // Day 37 — onboarding modal (two-question, dynamic starters)
    const [showOnboarding, setShowOnboarding] = useState(() => !LS.get('mc_onboarded'));

    // Day 40 — multimodal sense inputs (vision + audio).
    // attachments: list of {id, name, dataUrl, size, mime, status: 'compressing'|'ready'|'error'}
    // Max 4 images per send (Anthropic Claude.ai limit).
    const [attachments, setAttachments] = useState([]);
    const [attachError, setAttachError] = useState('');
    // Mic recording state
    const [recording, setRecording] = useState(false);
    const [recordSecs, setRecordSecs] = useState(0);
    const [recordError, setRecordError] = useState('');

    const endRef     = useRef(null);
    const taRef      = useRef(null);
    const stopRef    = useRef(null);
    const streamMsgId = useRef(null);
    // Mic refs (kept outside state to avoid re-renders during recording)
    const recRef     = useRef(null);   // MediaRecorder instance
    const recChunks  = useRef([]);     // collected blobs
    const recStream  = useRef(null);   // raw MediaStream (closed on stop)
    const recTimer   = useRef(null);   // setInterval handle for elapsed counter
    const recCapTo   = useRef(null);   // setTimeout handle for 90s hard cap

    // ─── Init: ensure agent + load agent list (Day 29) ─────
    const refreshAgents = useCallback(async () => {
      try {
        const list = await api.listAgents();
        setAgents(Array.isArray(list) ? list : []);
        return list;
      } catch (e) {
        return [];
      }
    }, []);

    useEffect(() => {
      (async () => {
        try {
          let aid  = LS.get('agent_id');
          let aname = LS.get('agent_name') || 'MiganCore';

          // Day 29: Load all agents first
          const list = await refreshAgents();

          // Validate stored agent still exists
          if (aid && list && Array.isArray(list)) {
            const found = list.find(a => a.id === aid);
            if (!found) { aid = null; aname = null; }
          }

          // Pick from list, or create new
          if (!aid) {
            if (list && list.length > 0) {
              const first = list[0];
              aid = first.id;
              aname = first.name;
            } else {
              const agent = await api.createAgent('MiganCore');
              aid   = agent.id;
              aname = agent.name;
              await refreshAgents();
            }
            LS.set('agent_id',   aid);
            LS.set('agent_name', aname);
          }
          setAgentId(aid);
          setAgentName(aname);
        } catch (err) {
          setInitErr(`Failed to init agent: ${err.message}`);
        } finally {
          setIniting(false);
        }
      })();
    }, [refreshAgents]);

    // Switch to a different agent
    const switchAgent = useCallback((agent) => {
      if (!agent || agent.id === agentId) return;
      setAgentId(agent.id);
      setAgentName(agent.name);
      LS.set('agent_id', agent.id);
      LS.set('agent_name', agent.name);
      // Reset chat state for the new agent context
      setMsgs([]);
      setConvId(null);
      LS.del('mc_msgs');
      LS.del('mc_conv');
    }, [agentId]);

    // After successful spawn — switch to new child + refresh list
    const handleSpawned = useCallback(async (child) => {
      setSpawnOpen(false);
      await refreshAgents();
      switchAgent({ id: child.id, name: child.name, generation: child.generation });
    }, [refreshAgents, switchAgent]);

    // ─── Restore session ──────────────────────────────────
    useEffect(() => {
      const saved = LS.get('mc_msgs');
      if (Array.isArray(saved)) setMsgs(saved);

      const cid = LS.get('mc_conv');
      if (cid) setConvId(cid);

      const cl = LS.get('mc_convlist');
      if (Array.isArray(cl)) setConvList(cl);
    }, []);

    // ─── Auto-scroll ──────────────────────────────────────
    useEffect(() => {
      endRef.current?.scrollIntoView({ behavior: 'smooth' });
    }, [msgs]);

    // ─── Persist messages ─────────────────────────────────
    useEffect(() => {
      if (msgs.length > 0) LS.set('mc_msgs', msgs.slice(-60));
    }, [msgs]);

    // ─── New chat ─────────────────────────────────────────
    const newChat = useCallback(() => {
      if (msgs.length > 0 && convId) {
        const first = msgs.find(m => m.role === 'user');
        const title = first?.content.slice(0, 42) || 'Chat';
        const updated = [{ id: convId, title }, ...convList.slice(0, 19)];
        setConvList(updated);
        LS.set('mc_convlist', updated);
      }
      setMsgs([]);
      setConvId(null);
      setInput('');
      LS.del('mc_msgs');
      LS.del('mc_conv');
    }, [msgs, convId, convList]);

    // ─── Send message (Day 36: with retry support) ───────
    // Internal helper — does NOT touch input field, can be reused for retry
    const dispatchMessage = useCallback((text, opts = {}) => {
      if (!text || busy || !agentId) return;

      const uid = opts.userMsgId || Date.now();
      const aid = uid + 1;
      streamMsgId.current = aid;

      // Day 36: track first chunk arrival for state hierarchy
      let firstChunkAt = null;

      if (!opts.retryOf) {
        // Normal send — add user + assistant placeholder.
        // Day 40 fix: when augmented (image attach), display ORIGINAL text + thumbnails
        // in the user bubble; the augmented prompt is sent to the LLM but never shown.
        const displayText = opts.displayText !== undefined ? opts.displayText : text;
        const userAttachments = opts.attachments || null;
        setMsgs(p => [
          ...p,
          { id: uid, role: 'user', content: displayText, attachments: userAttachments },
          { id: aid, role: 'assistant', content: '', streaming: true, toolCount: 0, lastUserText: text, lastUserMsgId: uid },
        ]);
      } else {
        // Retry — replace the failed assistant message
        setMsgs(p => p.map(m =>
          m.id === opts.retryOf
            ? { ...m, content: '', streaming: true, error: false, lastUserText: text, lastUserMsgId: opts.userMsgId }
            : m
        ));
      }
      setBusy(true);

      let localConvId = convId;
      const targetMsgId = opts.retryOf || aid;

      const stop = startStream(agentId, text, localConvId, {
        onStart: (cid) => {
          localConvId = cid;
          setConvId(cid);
          LS.set('mc_conv', cid);
        },
        // Day 40 — tool execution events from hybrid stream endpoint
        onToolStart: (tools) => {
          // Append running chips to message.tools[] (preserves order, idempotent on retry)
          setMsgs(p => p.map(m =>
            m.id === targetMsgId
              ? {
                  ...m,
                  tools: [
                    ...(m.tools || []),
                    ...tools.map(t => ({ name: t.name, state: 'running', result: null, error: null })),
                  ],
                  toolCount: (m.toolCount || 0) + tools.length,
                }
              : m
          ));
        },
        onToolResult: (ev) => {
          setMsgs(p => p.map(m => {
            if (m.id !== targetMsgId) return m;
            // Find the most recent matching running chip and resolve it
            const arr = [...(m.tools || [])];
            for (let i = arr.length - 1; i >= 0; i--) {
              if (arr[i].name === ev.tool && arr[i].state === 'running') {
                arr[i] = {
                  ...arr[i],
                  state: ev.ok ? 'done' : 'error',
                  result: ev.result,
                  error: ev.error,
                };
                break;
              }
            }
            return { ...m, tools: arr };
          }));
        },
        onChunk: (chunk) => {
          if (!firstChunkAt) firstChunkAt = Date.now();
          setMsgs(p => p.map(m =>
            m.id === targetMsgId ? { ...m, content: m.content + chunk } : m
          ));
        },
        onDone: () => {
          setMsgs(p => p.map(m =>
            m.id === targetMsgId ? { ...m, streaming: false, error: false } : m
          ));
          setBusy(false);
          stopRef.current = null;
        },
        onError: (msg) => {
          // Day 36: friendly error mapping
          let friendly = msg;
          const lower = (msg || '').toLowerCase();
          if (lower.includes('typeerror') || lower.includes('network') || lower.includes('fetch') || lower.includes('koneksi')) {
            friendly = 'Koneksi terputus. Pesan kamu aman — coba klik Retry di bawah.';
          } else if (lower.includes('timeout') || lower.includes('timed out')) {
            friendly = 'MiganCore butuh waktu lebih lama dari biasanya. Klik Retry untuk mencoba lagi.';
          } else if (lower.includes('unauthorized') || lower.includes('401')) {
            friendly = 'Sesi habis. Silakan logout + login lagi.';
          } else if (lower.includes('rate limit') || lower.includes('429')) {
            friendly = 'Terlalu banyak request. Tunggu sebentar lalu coba lagi.';
          }
          setMsgs(p => p.map(m =>
            m.id === targetMsgId ? { ...m, content: friendly, streaming: false, error: true } : m
          ));
          setBusy(false);
          stopRef.current = null;
        },
      });

      stopRef.current = stop;
    }, [busy, agentId, convId]);

    // Public send — clears input + dispatches
    // Day 40 — visioning state (separate from chat busy so user sees explicit progress)
    const [visioning, setVisioning] = useState(false);

    const send = useCallback(async (txt) => {
      const text = (typeof txt === 'string' ? txt : input).trim();
      const ready = attachments.filter(a => a.status === 'ready' && a.dataUrl);
      const hasImages = ready.length > 0;
      // Block: nothing to send, currently busy, or agent missing
      if (!text && !hasImages) return;
      if (busy || !agentId) return;

      let augmentedText = text || 'Tolong bahas gambar yang saya lampirkan.';
      let displayText = text || '';
      let userAttachments = null;

      // Day 40: pre-process images via /v1/vision/describe so the brain (Qwen2.5-7B)
      // gets a text caption injected — no base64 in chat history (saves DB + tokens).
      // ADO alignment: modality-as-tool routing (Anthropic Claude Skills Mar 2026).
      if (hasImages) {
        // Snapshot thumbnails for the user bubble BEFORE we clear attachments[]
        userAttachments = ready.map(a => ({
          id: a.id,
          name: a.name,
          dataUrl: a.dataUrl,
          mime: a.mime,
        }));

        setVisioning(true);
        const captions = [];
        for (let i = 0; i < ready.length; i++) {
          const att = ready[i];
          try {
            const b64 = att.dataUrl.split(',')[1] || '';
            const resp = await api.visionDescribe({
              image_base64: b64,
              mime_type: att.mime || 'image/jpeg',
              question: text || 'Describe this image in detail. List notable elements and any visible text.',
              lang: (LS.get('mc_onboard_lang') === 'en') ? 'en' : 'id',
            });
            captions.push(resp?.answer || '(tanpa keterangan)');
          } catch (e) {
            captions.push(`[Gagal proses gambar ${i+1}: ${e.message || e}]`);
          }
        }
        // Reset attachments + clear pending error
        setAttachments([]);
        setAttachError('');
        setVisioning(false);

        const captionBlock = captions
          .map((c, i) => `Gambar ${i+1}: ${c}`)
          .join('\n\n');
        const userQuestion = text || 'Tolong rangkum isi gambarnya.';
        // Sent to LLM (verbose, with anti-tool-call instruction)
        augmentedText =
          `[KONTEKS — Berikut deskripsi ${captions.length === 1 ? 'gambar' : `${captions.length} gambar`} yang dilampirkan user (sudah dianalisis backend Vision, ini final, JANGAN panggil tool apapun, JANGAN generate gambar baru):]\n\n` +
          `${captionBlock}\n\n` +
          `[PERTANYAAN USER]: ${userQuestion}\n\n` +
          `[INSTRUKSI]: Jawab pertanyaan di atas berdasarkan deskripsi gambar. Gunakan bahasa yang sama dengan pertanyaan user. JANGAN panggil tool generate_image / analyze_image / web_search — semua konteks sudah ada di atas.`;
        // Shown in user bubble (clean — original text or fallback hint)
        displayText = text || `(${captions.length === 1 ? 'gambar terlampir' : `${captions.length} gambar terlampir`})`;
      }

      setInput('');
      if (taRef.current) { taRef.current.style.height = 'auto'; }
      // Pass augmented text to LLM, displayText + attachments to UI bubble
      dispatchMessage(augmentedText, { displayText, attachments: userAttachments });
    }, [input, busy, agentId, dispatchMessage, attachments]);

    // Day 36: Retry — re-send the last user prompt for a failed assistant message
    const retry = useCallback((failedMsg) => {
      if (!failedMsg?.lastUserText) return;
      dispatchMessage(failedMsg.lastUserText, {
        retryOf: failedMsg.id,
        userMsgId: failedMsg.lastUserMsgId,
      });
    }, [dispatchMessage]);

    // ─── Day 40: Image attach (paste + drop + picker) ──────────
    // CompressorJS (CDN) downscales to 1568px (Anthropic Vision optimal) before
    // base64 encoding, keeping React state under ~200KB per image.
    const MAX_IMAGES = 4;          // Anthropic Claude.ai limit
    const MAX_IMAGE_BYTES = 8 * 1024 * 1024;  // pre-compress cap

    const compressImage = useCallback((file) => new Promise((resolve, reject) => {
      if (typeof Compressor === 'undefined') {
        // CompressorJS CDN failed to load — pass through original (still works for small imgs)
        const reader = new FileReader();
        reader.onload = () => resolve({ dataUrl: reader.result, size: file.size, mime: file.type });
        reader.onerror = () => reject(new Error('FileReader failed'));
        reader.readAsDataURL(file);
        return;
      }
      // eslint-disable-next-line no-undef
      new Compressor(file, {
        quality: 0.75,
        maxWidth: 1568,
        maxHeight: 1568,
        convertSize: 500_000,        // re-encode PNG > 500KB to JPEG
        success(blob) {
          const reader = new FileReader();
          reader.onload = () => resolve({ dataUrl: reader.result, size: blob.size, mime: blob.type });
          reader.onerror = () => reject(new Error('FileReader failed'));
          reader.readAsDataURL(blob);
        },
        error(err) { reject(err); },
      });
    }), []);

    const attachImage = useCallback(async (file) => {
      setAttachError('');
      if (!file || !file.type?.startsWith('image/')) {
        setAttachError('Bukan file gambar');
        return;
      }
      if (file.size > MAX_IMAGE_BYTES) {
        setAttachError(`Gambar terlalu besar (>${Math.round(MAX_IMAGE_BYTES/1024/1024)}MB)`);
        return;
      }
      const tempId = Date.now() + Math.random();
      // Optimistic: show as "compressing" immediately
      setAttachments(p => {
        if (p.length >= MAX_IMAGES) {
          setAttachError(`Maksimal ${MAX_IMAGES} gambar per pesan`);
          return p;
        }
        return [...p, { id: tempId, name: file.name || 'image', dataUrl: null, size: file.size, mime: file.type, status: 'compressing' }];
      });
      try {
        const { dataUrl, size, mime } = await compressImage(file);
        setAttachments(p => p.map(a => a.id === tempId ? { ...a, dataUrl, size, mime, status: 'ready' } : a));
      } catch (e) {
        setAttachments(p => p.filter(a => a.id !== tempId));
        setAttachError(`Gagal proses gambar: ${e.message || e}`);
      }
    }, [compressImage]);

    const removeAttachment = useCallback((id) => {
      setAttachments(p => p.filter(a => a.id !== id));
    }, []);

    // Paste handler — detects images in clipboard
    useEffect(() => {
      const handler = (e) => {
        if (!e.clipboardData) return;
        const items = [...e.clipboardData.items].filter(i => i.type.startsWith('image/'));
        if (items.length === 0) return;
        e.preventDefault();
        items.forEach(i => {
          const f = i.getAsFile();
          if (f) attachImage(f);
        });
      };
      window.addEventListener('paste', handler);
      return () => window.removeEventListener('paste', handler);
    }, [attachImage]);

    // Drag-drop handler scoped to chat area (set up via JSX onDragOver/onDrop)
    const onDragOver = useCallback((e) => {
      if (e.dataTransfer?.types?.includes('Files')) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'copy';
      }
    }, []);
    const onDrop = useCallback((e) => {
      const files = [...(e.dataTransfer?.files || [])].filter(f => f.type.startsWith('image/'));
      if (files.length === 0) return;
      e.preventDefault();
      files.forEach(f => attachImage(f));
    }, [attachImage]);

    // Picker (hidden input + button)
    const fileInputRef = useRef(null);
    const openFilePicker = useCallback(() => fileInputRef.current?.click(), []);
    const onPickerChange = useCallback((e) => {
      const files = [...(e.target.files || [])];
      files.forEach(f => attachImage(f));
      // Reset value so picking same file twice still triggers change
      e.target.value = '';
    }, [attachImage]);

    // ─── Day 40: Mic toggle (MediaRecorder → /v1/speech/to-text) ──
    const stopMic = useCallback(() => {
      try { recRef.current?.stop(); } catch {}
      try { recStream.current?.getTracks().forEach(t => t.stop()); } catch {}
      if (recTimer.current) { clearInterval(recTimer.current); recTimer.current = null; }
      if (recCapTo.current) { clearTimeout(recCapTo.current); recCapTo.current = null; }
      setRecording(false);
      setRecordSecs(0);
    }, []);

    const startMic = useCallback(async () => {
      setRecordError('');
      // Ask permission (must be on user gesture — Safari iOS quirk)
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (e) {
        if (e.name === 'NotAllowedError') {
          setRecordError('Akses mic ditolak. Aktifkan di setting browser.');
        } else {
          setRecordError('Tidak bisa akses mic: ' + (e.message || e.name));
        }
        return;
      }
      recStream.current = stream;
      recChunks.current = [];
      // Try opus (smallest); fall back to default
      let mimeType = 'audio/webm;codecs=opus';
      if (typeof MediaRecorder !== 'undefined' && !MediaRecorder.isTypeSupported(mimeType)) {
        mimeType = '';
      }
      const rec = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
      recRef.current = rec;
      rec.ondataavailable = (e) => { if (e.data && e.data.size > 0) recChunks.current.push(e.data); };
      rec.onstop = async () => {
        const blob = new Blob(recChunks.current, { type: rec.mimeType || 'audio/webm' });
        recChunks.current = [];
        // Reset stream + timers (already cleaned by stopMic, defensive)
        try { stream.getTracks().forEach(t => t.stop()); } catch {}
        if (blob.size < 800) {
          setRecordError('Rekaman terlalu pendek (<1 detik)');
          return;
        }
        // Upload to STT
        try {
          const fd = new FormData();
          // Pick filename based on mime
          const ext = (rec.mimeType || '').includes('webm') ? 'webm' : 'mp4';
          fd.append('file', blob, `mic_${Date.now()}.${ext}`);
          fd.append('lang_code', 'id');
          const resp = await fetch(`${API_BASE}/v1/speech/to-text`, {
            method: 'POST',
            body: fd,
            // Note: STT endpoint is currently open (rate-limited); no Bearer needed
          });
          const json = await resp.json();
          if (!resp.ok) {
            const detail = (json && json.detail) ? (typeof json.detail === 'string' ? json.detail : JSON.stringify(json.detail)) : `HTTP ${resp.status}`;
            setRecordError(`STT gagal: ${detail.slice(0, 120)}`);
            return;
          }
          const text = (json.text || '').trim();
          if (text) {
            setInput(prev => (prev ? prev + ' ' : '') + text);
            // Auto-grow textarea after insertion
            requestAnimationFrame(() => {
              if (taRef.current) {
                taRef.current.style.height = 'auto';
                taRef.current.style.height = Math.min(taRef.current.scrollHeight, 160) + 'px';
                taRef.current.focus();
              }
            });
          } else {
            setRecordError('Suara tidak terdengar — coba lagi.');
          }
        } catch (e) {
          setRecordError('Upload gagal: ' + (e.message || e));
        }
      };
      rec.start();
      setRecording(true);
      setRecordSecs(0);
      const startTs = Date.now();
      recTimer.current = setInterval(() => {
        setRecordSecs(Math.floor((Date.now() - startTs) / 1000));
      }, 250);
      // Hard cap 90s (research recommendation: ChatGPT 120s, Claude 60s; sweet spot)
      recCapTo.current = setTimeout(() => {
        if (recRef.current?.state === 'recording') stopMic();
      }, 90_000);
    }, [stopMic]);

    const toggleMic = useCallback(() => {
      if (recording) stopMic(); else startMic();
    }, [recording, startMic, stopMic]);


    const stop = () => {
      stopRef.current?.();
      setMsgs(p => p.map(m => m.streaming ? { ...m, streaming: false } : m));
      setBusy(false);
      stopRef.current = null;
    };

    const onKey = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send(input);
      }
    };

    const onInput = (e) => {
      setInput(e.target.value);
      e.target.style.height = 'auto';
      e.target.style.height = Math.min(e.target.scrollHeight, 160) + 'px';
    };

    const logout = () => {
      ['token', 'refresh_token', 'agent_id', 'agent_name', 'mc_msgs', 'mc_conv', 'mc_convlist'].forEach(k => LS.del(k));
      onLogout();
    };

    if (initing) {
      return (
        <div className="center-screen">
          <div className="spinner"/>
          <div className="loading-label">INITIALIZING AGENT...</div>
        </div>
      );
    }

    if (initErr) {
      return (
        <div className="center-screen">
          <div style={{ color: '#ff6b6b', fontFamily: 'var(--mono)', fontSize: '0.8rem', padding: '2rem', textAlign: 'center' }}>
            ⚠ {initErr}<br/>
            <button onClick={logout} style={{ marginTop: '1rem', padding: '0.5rem 1rem', background: 'transparent', border: '1px solid var(--border)', borderRadius: '6px', color: 'var(--text-dim)', cursor: 'pointer', fontFamily: 'var(--mono)', fontSize: '0.7rem' }}>
              LOGOUT & RETRY
            </button>
          </div>
        </div>
      );
    }

    const userInitial = (user?.email?.[0] || 'U').toUpperCase();

    return (
      <div className="app">
        {/* ── Sidebar ── */}
        <aside className="sidebar">
          <div className="sidebar-brand">
            <BrandSVG />
            <span className="brand-name">MIGANCORE</span>
          </div>

          <button className="btn-new" onClick={newChat}>+ NEW CHAT</button>

          {/* Day 29: Agent list + spawn button (Level 5 visibility) */}
          <div className="agent-list-section">
            <div className="section-label">AGENTS ({agents.length})</div>
            <div className="agent-list">
              {agents.map(a => (
                <div
                  key={a.id}
                  className={`agent-item ${a.id === agentId ? 'active' : ''}`}
                  onClick={() => switchAgent(a)}
                  title={`${a.name} (gen ${a.generation || 0})`}
                >
                  <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                    {a.name}
                  </span>
                  <span className="agent-gen-badge">G{a.generation || 0}</span>
                </div>
              ))}
            </div>
            <button className="btn-spawn" onClick={() => setSpawnOpen(true)} title="Spawn child agent from current">
              + SPAWN CHILD
            </button>
          </div>

          <div className="section-label" style={{ marginTop: '0.75rem' }}>RIWAYAT CHAT</div>
          <div className="conv-list">
            {convList.length === 0
              ? <div className="empty-convs">Belum ada chat</div>
              : convList.map(c => (
                  <div
                    key={c.id}
                    className={`conv-item ${c.id === convId ? 'active' : ''}`}
                    title={c.title}
                  >
                    {c.title}
                  </div>
                ))
            }
          </div>

          <div className="sidebar-footer">
            <div className="user-row">
              <div className="user-avatar">{userInitial}</div>
              <div className="user-email">{user?.email || 'user'}</div>
            </div>
            <button className="btn-logout" onClick={logout}>LOGOUT</button>
          </div>
        </aside>

        {/* ── Main ── */}
        <main className="chat-area">
          {/* Header */}
          <div className="chat-header">
            <div className="dot-pulse"/>
            <span className="header-agent">{agentName}</span>
            <span className="header-model">qwen2.5:7b · streaming</span>
          </div>

          {/* Messages */}
          <div className="messages">
            {msgs.length === 0 ? (
              <div className="empty-state">
                <div className="empty-logo">MIGANCORE</div>
                <div className="empty-sub">CORE AI ENGINE — SIAP MEMBANTU</div>
                <div className="hint-grid">
                  {HINTS.map(h => (
                    <div key={h} className="hint-chip" onClick={() => send(h)}>{h}</div>
                  ))}
                </div>
              </div>
            ) : (
              msgs.map(m => (
                <Msg
                  key={m.id}
                  msg={m}
                  onRetry={retry}
                />
              ))
            )}
            <div ref={endRef}/>
          </div>

          {/* Input — Day 40: with image attach + mic toggle, drag-drop zone covers whole area */}
          <div className="input-area" onDragOver={onDragOver} onDrop={onDrop}>
            {/* Hidden file picker */}
            <input
              ref={fileInputRef}
              type="file"
              accept="image/*"
              multiple
              capture="environment"
              onChange={onPickerChange}
              style={{ display: 'none' }}
            />

            {/* Day 40 — thumbnail strip above input (visible when ada attachment atau visioning) */}
            {(attachments.length > 0 || visioning || attachError) && (
              <div style={{
                display: 'flex', flexWrap: 'wrap', gap: 8, padding: '8px 0',
                borderBottom: '1px solid var(--border)', marginBottom: 8,
              }}>
                {attachments.map(a => (
                  <div key={a.id} style={{
                    position: 'relative',
                    width: 64, height: 64, borderRadius: 6, overflow: 'hidden',
                    background: 'var(--bg-2)',
                    border: a.status === 'ready' ? '1px solid var(--green-border)' : '1px solid var(--orange-border)',
                  }}>
                    {a.status === 'ready' && a.dataUrl ? (
                      <img src={a.dataUrl} alt={a.name} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                    ) : (
                      <div style={{
                        width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center',
                        fontSize: 18, color: 'var(--orange)',
                      }}>⏳</div>
                    )}
                    <button
                      onClick={() => removeAttachment(a.id)}
                      style={{
                        position: 'absolute', top: 2, right: 2,
                        width: 18, height: 18, borderRadius: '50%',
                        background: 'rgba(0,0,0,0.7)', color: 'white',
                        border: 'none', cursor: 'pointer', fontSize: 12, lineHeight: 1, padding: 0,
                      }}
                      title="Remove"
                    >×</button>
                  </div>
                ))}
                {visioning && (
                  <div style={{
                    fontSize: 11, color: 'var(--orange)', display: 'flex', alignItems: 'center', gap: 6,
                    fontFamily: 'var(--mono)', padding: '0 8px',
                  }}>
                    👁 Vision menganalisis…
                  </div>
                )}
                {attachError && (
                  <div style={{
                    fontSize: 11, color: '#ff6b6b', alignSelf: 'center',
                    fontFamily: 'var(--mono)', padding: '0 8px',
                  }}>{attachError}</div>
                )}
              </div>
            )}

            {/* Day 40 — recording state strip */}
            {(recording || recordError) && (
              <div style={{
                display: 'flex', alignItems: 'center', gap: 8,
                padding: '6px 8px', marginBottom: 8,
                background: recording ? 'rgba(255, 107, 107, 0.10)' : 'transparent',
                border: recording ? '1px solid rgba(255, 107, 107, 0.4)' : 'none',
                borderRadius: 6, fontFamily: 'var(--mono)', fontSize: 12,
              }}>
                {recording && (
                  <>
                    <span style={{
                      display: 'inline-block', width: 10, height: 10, borderRadius: '50%',
                      background: '#ff6b6b', animation: 'pulse 1.2s ease-in-out infinite',
                    }}></span>
                    <span style={{ color: '#ff6b6b' }}>Recording {Math.floor(recordSecs/60)}:{String(recordSecs%60).padStart(2,'0')} · klik mic untuk stop</span>
                  </>
                )}
                {!recording && recordError && (
                  <span style={{ color: '#ff6b6b' }}>{recordError}</span>
                )}
              </div>
            )}

            <div className="input-row">
              {/* Day 40 — image attach button */}
              <button
                className="btn-action"
                onClick={openFilePicker}
                disabled={busy || visioning || attachments.length >= 4}
                title="Lampirkan gambar (atau drag & drop / paste)"
                style={{
                  background: 'var(--bg-2)', color: 'var(--text-dim)',
                  border: '1px solid var(--border)', width: 38, height: 38,
                }}
              >📎</button>

              {/* Day 40 — mic toggle button */}
              <button
                className="btn-action"
                onClick={toggleMic}
                disabled={busy || visioning}
                title={recording ? 'Stop rekaman' : 'Bicara (mic toggle)'}
                style={{
                  background: recording ? 'rgba(255, 107, 107, 0.15)' : 'var(--bg-2)',
                  color: recording ? '#ff6b6b' : 'var(--text-dim)',
                  border: recording ? '1px solid rgba(255, 107, 107, 0.5)' : '1px solid var(--border)',
                  width: 38, height: 38,
                }}
              >{recording ? '■' : '🎤'}</button>

              <textarea
                ref={taRef}
                className="chat-input"
                placeholder={attachments.length > 0
                  ? 'Tanya tentang gambarnya... (atau biarkan kosong)'
                  : 'Ketik pesan... (Enter kirim · Shift+Enter baris baru · paste/drop gambar)'}
                value={input}
                onChange={onInput}
                onKeyDown={onKey}
                disabled={busy || visioning}
                rows={1}
              />
              {busy ? (
                <button className="btn-action stop" onClick={stop} title="Stop streaming">
                  <StopIcon/>
                </button>
              ) : (
                <button
                  className="btn-action send"
                  onClick={() => send(input)}
                  disabled={(!input.trim() && attachments.length === 0) || visioning}
                >
                  <SendIcon/>
                </button>
              )}
            </div>
            <div className="input-hint">
              {visioning
                ? '👁 Vision processing… brain akan terima caption.'
                : 'ENTER kirim · SHIFT+ENTER baris baru · 📎 / paste / drop gambar · 🎤 mic'}
            </div>
            {/* Day 51: Beta feedback shortcut — WhatsApp deeplink (research: WhatsApp >> forms 10:1 at N=5) */}
            <a
              href={'https://wa.me/?text=' + encodeURIComponent(
                '[MiganCore Beta Feedback]\n\nConv: ' + (convId || 'new') + '\nUser: ' + ((user && user.email) || 'guest') + '\n\nMy feedback:\n'
              )}
              target="_blank"
              rel="noopener noreferrer"
              style={{
                display: 'inline-block',
                marginTop: '0.5rem',
                fontSize: '0.7rem',
                color: 'var(--text-dim)',
                textDecoration: 'none',
                opacity: 0.7,
                fontFamily: 'var(--mono)',
              }}
              title="Kirim feedback via WhatsApp (auto-fill conversation context)"
            >
              💬 Beta feedback? Klik untuk WhatsApp
            </a>
          </div>
        </main>

        {/* Day 29: Spawn Modal */}
        {spawnOpen && (
          <SpawnModal
            parentAgent={agents.find(a => a.id === agentId) || { id: agentId, name: agentName, generation: 0 }}
            onClose={() => setSpawnOpen(false)}
            onSpawned={handleSpawned}
          />
        )}

        {/* Day 37: Onboarding Modal — first-run experience, two-question pattern */}
        {showOnboarding && !initing && (
          <OnboardingModal
            user={user}
            onComplete={(seedPrompt) => {
              setShowOnboarding(false);
              if (seedPrompt) setInput(seedPrompt);
            }}
          />
        )}
      </div>
    );
  }

  // ===========================
  // APP ROOT
  // ===========================
  function App() {
    // phase: 'boot' | 'auth' | 'chat'
    const [phase, setPhase] = useState('boot');
    const [user, setUser]   = useState(null);

    const onBootDone = useCallback(async () => {
      const token = LS.get('token');
      if (!token) { setPhase('auth'); return; }
      try {
        const me = await api.me();
        setUser(me);
        setPhase('chat');
      } catch {
        LS.del('token');
        LS.del('refresh_token');
        setPhase('auth');
      }
    }, []);

    const onAuthSuccess = useCallback((me) => {
      setUser(me);
      setPhase('chat');
    }, []);

    const onLogout = useCallback(() => {
      setUser(null);
      setPhase('auth');
    }, []);

    if (phase === 'boot') return <BootSequence onDone={onBootDone}/>;
    if (phase === 'auth') return <AuthScreen onSuccess={onAuthSuccess}/>;
    if (phase === 'chat') return <ChatScreen user={user} onLogout={onLogout}/>;

    return (
      <div className="center-screen">
        <div className="spinner"/>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
